<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In Emocional | Livia Melo</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
<style>
:root{--navy:#1a2e4a;--gold:#b8922a;--cream:#faf8f4;--white:#fff;--g100:#f5f3ef;--g200:#e8e4dc;--g400:#9c9488;--g600:#5a5349;--green:#2e7d5b;--amber:#c17b2a;--red:#b33a3a;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh}
.hdr{background:var(--navy);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-name{font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.05rem;font-weight:700}
.hdr-crp{font-size:.58rem;color:var(--gold);text-transform:uppercase;letter-spacing:.1em}
.hdr-pill{background:var(--gold);color:var(--navy);font-size:.62rem;font-weight:900;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.prog{background:#fff;padding:9px 18px;border-bottom:1px solid var(--g200)}
.prog-row{display:flex;justify-content:space-between;font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--g400);margin-bottom:5px}
.prog-track{height:4px;background:var(--g200);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:4px;transition:width .4s ease}
.main{max-width:640px;margin:0 auto;padding:20px 14px 80px}
.step{display:none}.step.on{display:block}
.card{background:#fff;border-radius:14px;padding:28px 22px;box-shadow:0 4px 18px rgba(26,46,74,.09)}
.logo{width:60px;height:60px;display:block;margin:0 auto 16px}
.ttl{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:700;color:var(--navy);line-height:1.2;margin-bottom:10px;text-align:center}
.sub{font-size:.88rem;color:var(--g600);line-height:1.7;text-align:center;margin-bottom:18px}
.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.chip{background:var(--g100);color:var(--navy);font-size:.7rem;font-weight:700;padding:5px 12px;border-radius:20px}
.btn-start{display:block;width:100%;max-width:280px;margin:0 auto;background:var(--navy);color:#fff;border:none;padding:14px 28px;border-radius:12px;font-family:'Lato',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-start:active{opacity:.85}
.note{text-align:center;font-size:.76rem;color:var(--g400);margin-top:12px}
.sth{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--g200)}
.badge{display:inline-block;background:var(--gold);color:var(--navy);font-size:.6rem;font-weight:900;padding:3px 11px;border-radius:20px;text-transform:uppercase;margin-bottom:7px}
.sttl{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:700;color:var(--navy);margin-bottom:3px}
.ssub{font-size:.8rem;color:var(--g600)}
.fg{margin-bottom:16px}
.fl{display:block;font-size:.7rem;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.fi{width:100%;padding:11px 14px;border:2px solid var(--g200);border-radius:12px;font-family:'Lato',sans-serif;font-size:.9rem;color:var(--navy);background:#fff;outline:none;-webkit-appearance:none;-webkit-tap-highlight-color:transparent}
.fi:focus{border-color:var(--gold)}
.instr{background:var(--navy);color:#fff;padding:12px 15px;border-radius:10px;font-size:.8rem;line-height:1.6;margin-bottom:16px}
.instr b{color:var(--gold)}
.qcard{background:#fff;border-radius:12px;padding:14px;margin-bottom:9px;box-shadow:0 2px 10px rgba(26,46,74,.07);border-left:4px solid var(--g200);transition:border-color .2s}
.qcard.ok{border-left-color:var(--gold)}
.qn{font-size:.6rem;font-weight:900;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.qt{font-size:.88rem;color:var(--navy);line-height:1.5;margin-bottom:11px}
.opts{display:grid;gap:4px}
.opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border:2px solid var(--g200);border-radius:8px;cursor:pointer;background:var(--cream);font-family:'Lato',sans-serif;font-size:.78rem;color:var(--g600);text-align:left;width:100%;-webkit-tap-highlight-color:transparent}
.opt:active{opacity:.8}
.opt.sel{border-color:var(--gold);background:#fff3d6;color:var(--navy);font-weight:700}
.on{width:20px;height:20px;min-width:20px;border-radius:50%;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;flex-shrink:0}
.opt.sel .on{background:var(--gold);color:#fff}
.erq-row{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px}
.eb{padding:7px 2px;border:2px solid var(--g200);border-radius:7px;cursor:pointer;background:var(--cream);font-family:'Lato',sans-serif;text-align:center;-webkit-tap-highlight-color:transparent}
.eb:active{opacity:.8}
.eb.sel{border-color:var(--gold);background:#fff3d6;font-weight:700}
.en{font-size:.9rem;font-weight:900;color:var(--navy);line-height:1}
.el{font-size:.48rem;color:var(--g400);line-height:1.3;margin-top:1px}
.nav{display:flex;gap:9px;margin-top:20px;justify-content:flex-end}
.btn{padding:11px 22px;border-radius:12px;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:.84rem;font-weight:700;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.85}
.btn-p{background:var(--navy);color:#fff}
.btn-s{background:transparent;color:var(--navy);border:2px solid var(--g200)}
.btn-g{background:var(--gold);color:var(--navy)}
.err{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:9px 13px;border-radius:8px;font-size:.78rem;margin-top:8px;display:none}
/* results */
.rhero{background:linear-gradient(135deg,var(--navy),#2a4a6b);color:#fff;padding:24px 20px;border-radius:14px;text-align:center;margin-bottom:18px}
.rname{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;line-height:1.1;margin-bottom:3px}
.rmeta{color:var(--gold);font-size:.74rem;text-transform:uppercase;letter-spacing:.08em}
.rsec{margin-bottom:22px}
.rstl{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:11px;padding-bottom:6px;border-bottom:2px solid var(--gold)}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sc{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(26,46,74,.07);text-align:center;border-top:4px solid transparent}
.sc.lo{border-top-color:var(--green)}.sc.mo{border-top-color:var(--amber)}.sc.hi{border-top-color:var(--red)}
.slbl{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--g400);margin-bottom:5px}
.sval{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:700;line-height:1;margin-bottom:4px}
.sval span{font-size:.82rem;opacity:.4}
.stag{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:12px;display:inline-block}
.lo .stag{background:#d1fae5;color:var(--green)}.mo .stag{background:#fef3c7;color:var(--amber)}.hi .stag{background:#fee2e2;color:var(--red)}
.cbox{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(26,46,74,.07);margin-bottom:10px}
.cttl{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--g600);text-align:center;margin-bottom:12px}
.sbars{display:flex;flex-direction:column;gap:7px}
.srow{display:grid;grid-template-columns:130px 1fr 34px;align-items:center;gap:6px}
.sn{font-size:.7rem;font-weight:700;color:var(--g600);text-align:right}
.st{height:7px;background:var(--g200);border-radius:7px;overflow:hidden}
.sb{height:100%;border-radius:7px;transition:width .8s ease}
.sp{font-size:.68rem;font-weight:700;color:var(--navy)}
.interp{background:var(--navy);color:#fff;border-radius:12px;padding:18px;margin-bottom:10px}
.interp h4{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);margin-bottom:6px}
.interp p{font-size:.82rem;line-height:1.75;opacity:.92}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.fc{border-radius:12px;padding:13px;font-size:.79rem;line-height:1.6}
.fc.str{background:#f0fdf4;border:1px solid #86efac;color:#14532d}
.fc.alt{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12}
.fc strong{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;opacity:.7}
.sbox{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 18px rgba(26,46,74,.09);text-align:center;margin-top:20px}
.sbox-t{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--navy);margin-bottom:3px}
.sbox-s{font-size:.78rem;color:var(--g400);margin-bottom:14px}
.sbtns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:center;justify-content:center;padding:14px}
.mov.on{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:500px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.mhdr{background:var(--navy);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.mhdr-t{font-family:'Cormorant Garamond',serif;color:#fff;font-size:1.05rem;font-weight:700}
.mclose{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:.9rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mbody{padding:14px;overflow-y:auto;flex:1}
.mnote{font-size:.78rem;color:var(--g600);background:var(--g100);padding:9px 12px;border-radius:8px;margin-bottom:11px;line-height:1.6}
.mta{width:100%;height:160px;border:2px solid var(--g200);border-radius:9px;padding:10px;font-family:monospace;font-size:.68rem;color:var(--g600);resize:none;line-height:1.5}
.macts{display:flex;flex-direction:column;gap:7px;margin-top:11px}
.btn-wpp{background:#25D366;color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Lato',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
.btn-wpp:active{background:#1ebe5d}
.btn-cp{background:var(--navy);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Lato',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-cp:active{opacity:.85}
.cpok{text-align:center;font-size:.8rem;font-weight:700;color:var(--green);padding:6px;display:none}
</style>
</head>
<body>
<header class="hdr">
  <div style="display:flex;align-items:center;gap:9px">
    <svg width="30" height="30" viewBox="0 0 30 30"><circle cx="15" cy="15" r="15" fill="#1a2e4a"/><ellipse cx="15" cy="15" rx="4.5" ry="9" fill="#b8922a" opacity=".9"/><ellipse cx="15" cy="15" rx="4.5" ry="9" fill="#b8922a" opacity=".7" transform="rotate(60 15 15)"/><ellipse cx="15" cy="15" rx="4.5" ry="9" fill="#b8922a" opacity=".5" transform="rotate(120 15 15)"/></svg>
    <div><div class="hdr-name">Livia Melo</div><div class="hdr-crp">Psicologa - CRP 11-04802</div></div>
  </div>
  <span class="hdr-pill">Check-In Emocional</span>
</header>

<div class="prog">
  <div class="prog-row"><span id="pLbl">Inicio</span><span id="pPct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
</div>

<main class="main">
<div class="step on" id="s0">
  <div class="card">
    <svg class="logo" viewBox="0 0 60 60"><circle cx="30" cy="30" r="30" fill="#1a2e4a"/><ellipse cx="30" cy="30" rx="8" ry="16" fill="#b8922a" opacity=".9"/><ellipse cx="30" cy="30" rx="8" ry="16" fill="#b8922a" opacity=".7" transform="rotate(60 30 30)"/><ellipse cx="30" cy="30" rx="8" ry="16" fill="#b8922a" opacity=".5" transform="rotate(120 30 30)"/></svg>
    <div class="ttl">Check-In Emocional<br>para o Intercambio</div>
    <p class="sub">Antes de embarcar na sua maior aventura, vamos olhar para dentro. Esta avaliacao mapeia seus recursos emocionais.</p>
    <div class="chips">
      <span class="chip">Estresse</span><span class="chip">Ansiedade</span><span class="chip">Enfrentamento</span><span class="chip">Resiliencia</span><span class="chip">Regulacao Emocional</span>
    </div>
    <button class="btn-start" id="btnStart">Iniciar Avaliacao</button>
    <p class="note">Tempo estimado: 25 a 35 minutos</p>
  </div>
</div>

<div class="step" id="s1">
  <div class="sth"><span class="badge">Etapa 1 de 6</span><div class="sttl">Identificacao</div><p class="ssub">Preencha seus dados.</p></div>
  <div class="fg"><label class="fl">Nome completo</label><input class="fi" type="text" id="fNome" placeholder="Seu nome completo" autocomplete="name"></div>
  <div class="fg"><label class="fl">Data de nascimento</label><input class="fi" type="date" id="fNasc"></div>
  <div class="fg"><label class="fl">Data da avaliacao</label><input class="fi" type="date" id="fData"></div>
  <div class="err" id="e1">Preencha todos os campos.</div>
  <div class="nav"><button class="btn btn-p" id="btn1">Proximo</button></div>
</div>

<div class="step" id="s2">
  <div class="sth"><span class="badge">Instrumento 1 - Estresse</span><div class="sttl">Escala de Estresse Percebido</div><p class="ssub">PSS-10</p></div>
  <div id="wPSS"></div>
  <div class="err" id="e2">Responda todas as questoes.</div>
  <div class="nav"><button class="btn btn-s" id="btn2b">Voltar</button><button class="btn btn-p" id="btn2">Proximo</button></div>
</div>

<div class="step" id="s3">
  <div class="sth"><span class="badge">Instrumento 2 - Ansiedade</span><div class="sttl">Escala de Ansiedade</div><p class="ssub">GAD-7</p></div>
  <div id="wGAD"></div>
  <div class="err" id="e3">Responda todas as questoes.</div>
  <div class="nav"><button class="btn btn-s" id="btn3b">Voltar</button><button class="btn btn-p" id="btn3">Proximo</button></div>
</div>

<div class="step" id="s4">
  <div class="sth"><span class="badge">Instrumento 3 - Enfrentamento</span><div class="sttl">Estilos de Enfrentamento</div><p class="ssub">Brief COPE</p></div>
  <div id="wCOPE"></div>
  <div class="err" id="e4">Responda todas as questoes.</div>
  <div class="nav"><button class="btn btn-s" id="btn4b">Voltar</button><button class="btn btn-p" id="btn4">Proximo</button></div>
</div>

<div class="step" id="s5">
  <div class="sth"><span class="badge">Instrumento 4 - Resiliencia</span><div class="sttl">Escala de Resiliencia</div><p class="ssub">CD-RISC-10</p></div>
  <div id="wCDR"></div>
  <div class="err" id="e5">Responda todas as questoes.</div>
  <div class="nav"><button class="btn btn-s" id="btn5b">Voltar</button><button class="btn btn-p" id="btn5">Proximo</button></div>
</div>

<div class="step" id="s6">
  <div class="sth"><span class="badge">Instrumento 5 - Regulacao</span><div class="sttl">Regulacao Emocional</div><p class="ssub">ERQ</p></div>
  <div id="wERQ"></div>
  <div class="err" id="e6">Responda todas as questoes.</div>
  <div class="nav"><button class="btn btn-s" id="btn6b">Voltar</button><button class="btn btn-g" id="btn6">Ver meu perfil</button></div>
</div>

<div class="step" id="sR"></div>
</main>

<div class="mov" id="modal">
  <div class="modal">
    <div class="mhdr"><span class="mhdr-t">Enviar para Dra. Livia Melo</span><button class="mclose" id="mCloseBtn">x</button></div>
    <div class="mbody">
      <div class="mnote">Toque em <b>WhatsApp</b> para enviar direto, ou <b>Copiar</b> para colar no e-mail.</div>
      <textarea class="mta" id="mTxt" readonly></textarea>
      <div class="macts">
        <button class="btn-wpp" id="btnWpp">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar pelo WhatsApp
        </button>
        <button class="btn-cp" id="btnCopy">Copiar Texto</button>
        <div class="cpok" id="cpOk">Copiado! Cole no e-mail para a Dra. Livia.</div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

// ─── DADOS ───────────────────────────────────
var user={};
var A={pss:{},gad:{},cope:{},cdr:{},erq:{}};

var PLBLS=['Inicio','Identificacao','Estresse PSS-10','Ansiedade GAD-7','Enfrentamento COPE','Resiliencia CD-RISC','Regulacao ERQ','Resultados'];

var PSS=['No ultimo mes, com que frequencia ficou transtornado(a) porque algo aconteceu inesperadamente?','No ultimo mes, com que frequencia se sentiu incapaz de controlar coisas importantes em sua vida?','No ultimo mes, com que frequencia se sentiu nervoso(a) e estressado(a)?','No ultimo mes, com que frequencia se sentiu confiante na sua capacidade de lidar com problemas?','No ultimo mes, com que frequencia sentiu que as coisas caminhavam do jeito que queria?','No ultimo mes, com que frequencia achou que nao conseguiria dar conta de tudo?','No ultimo mes, com que frequencia conseguiu controlar suas irritacoes?','No ultimo mes, com que frequencia sentiu que estava no controle das situacoes?','No ultimo mes, com que frequencia ficou com raiva de coisas fora do seu controle?','No ultimo mes, com que frequencia sentiu que as dificuldades se acumulavam demais?'];

// ─── RENDER ──────────────────────────────────
function mkOpt(p,i,j,sc,ans){
  var b=document.createElement('button');
  b.className='opt'+(ans[p+'_'+i]===j?' sel':'');
  b.innerHTML='<span class="on">'+j+'</span><span>'+sc[j]+'</span>';
  b.addEventListener('click',function(){ pick(p,i,j,ans); });
  return b;
}

function renderQ(wId,items,sc,p,ans){
  var w=document.getElementById(wId);
  if(!w)return;
  w.innerHTML='';
  for(var i=0;i<items.length;i++){
    (function(idx){
      var d=document.createElement('div');
      d.className='qcard'+(ans[p+'_'+idx]!==undefined?' ok':'');
      d.id='q-'+p+'-'+idx;
      var qt=document.createElement('div');qt.className='qn';qt.textContent='Questao '+(idx+1)+' de '+items.length;
      var qx=document.createElement('div');qx.className='qt';qx.textContent=items[idx];
      var qo=document.createElement('div');qo.className='opts';
      for(var j=0;j<sc.length;j++) qo.appendChild(mkOpt(p,idx,j,sc,ans));
      d.appendChild(qt);d.appendChild(qx);d.appendChild(qo);
      w.appendChild(d);
    })(i);
  }
}

function renderERQ(){
  var w=document.getElementById('wERQ');
  if(!w)return;
  w.innerHTML='';
  for(var i=0;i<ERQ.length;i++){
    (function(idx){
      var d=document.createElement('div');
      d.className='qcard'+(A.erq['erq_'+idx]!==undefined?' ok':'');
      d.id='q-erq-'+idx;
      var qt=document.createElement('div');qt.className='qn';qt.textContent='Questao '+(idx+1)+' de '+ERQ.length;
      var qx=document.createElement('div');qx.className='qt';qx.textContent=ERQ[idx];
      var row=document.createElement('div');row.className='erq-row';
      for(var j=1;j<=7;j++){
        (function(v){
          var b=document.createElement('button');
          b.className='eb'+(A.erq['erq_'+idx]===v?' sel':'');
          var lbl=v===1?'Discordo':v===4?'Neutro':v===7?'Concordo':'';
          b.innerHTML='<div class="en">'+v+'</div>'+(lbl?'<div class="el">'+lbl+'</div>':'');
          b.addEventListener('click',function(){ pickERQ(idx,v); });
          row.appendChild(b);
        })(j);
      }
      d.appendChild(qt);d.appendChild(qx);d.appendChild(row);
      w.appendChild(d);
    })(i);
  }
}

function pick(p,i,v,ans){
  ans[p+'_'+i]=v;
  var card=document.getElementById('q-'+p+'-'+i);
  if(card){
    card.className='qcard ok';
    var btns=card.querySelectorAll('.opt');
    for(var k=0;k<btns.length;k++){
      var b=btns[k];
      var on=b.querySelector('.on');
      if(k===v){b.className='opt sel';if(on){on.style.background='var(--gold)';on.style.color='#fff';}}
      else{b.className='opt';if(on){on.style.background='';on.style.color='';}}
    }
  }
}

function pickERQ(i,v){
  A.erq['erq_'+i]=v;
  var card=document.getElementById('q-erq-'+i);
  if(card){
    card.className='qcard ok';
    var btns=card.querySelectorAll('.eb');
    for(var k=0;k<btns.length;k++) btns[k].className=(k+1===v)?'eb sel':'eb';
  }
}

// ─── VALIDACAO ────────────────────────────────
function chk(p,n){
  for(var i=0;i<n;i++) if(A[p][p+'_'+i]===undefined) return i;
  return -1;
}

// ─── PONTUACAO ────────────────────────────────
function sPSS(){
  var t=0;
  for(var i=0;i<10;i++){var v=A.pss['pss_'+i];if(PSS_R.indexOf(i)>=0)v=4-v;t+=v;}
  var lv=t<=13?'lo':t<=26?'mo':'hi';
  return{t:t,lv:lv,lbl:t<=13?'Baixo':t<=26?'Moderado':'Elevado',pct:Math.round(t/40*100)};
}
function sGAD(){
  var t=0;for(var i=0;i<7;i++)t+=A.gad['gad_'+i];
  var lv=t<=4?'lo':t<=9?'mo':'hi';
  return{t:t,lv:lv,lbl:t<=4?'Minima':t<=9?'Leve':t<=14?'Moderada':'Grave',pct:Math.round(t/21*100)};
}
function sCOPE(){
  var ss={};
  for(var nm in CS){var ix=CS[nm],s=0;for(var k=0;k<ix.length;k++)s+=(A.cope['cope_'+ix[k]]||0);ss[nm]=s;}
  var st={};
  for(var sn in CSTYLES){
    var subs=CSTYLES[sn],sc2=0,mx=0;
    for(var k=0;k<subs.length;k++){sc2+=ss[subs[k]];mx+=CS[subs[k]].length*3;}
    st[sn]={score:sc2,max:mx,pct:Math.round(sc2/mx*100)};
  }
  return{ss:ss,st:st};
}
function sCDR(){
  var t=0;for(var i=0;i<10;i++)t+=A.cdr['cdr_'+i];
  var lv=t<=20?'hi':t<=30?'mo':'lo';
  return{t:t,lv:lv,lbl:t<=20?'Em desenvolvimento':t<=30?'Moderada':'Elevada',pct:Math.round(t/40*100)};
}
function sERQ(){
  var rp=0,sp=0;
  for(var k=0;k<ERQ_R.length;k++)rp+=(A.erq['erq_'+ERQ_R[k]]||0);
  for(var k=0;k<ERQ_S.length;k++)sp+=(A.erq['erq_'+ERQ_S[k]]||0);
  rp=Math.round(rp/ERQ_R.length*10)/10;
  sp=Math.round(sp/ERQ_S.length*10)/10;
  return{rp:{v:rp,pct:Math.round((rp-1)/6*100)},sp:{v:sp,pct:Math.round((sp-1)/6*100)}};
}
